<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Alphabet Tracing Simulator</title>
<style>
  body {
    text-align: center;
    font-family: 'Comic Sans MS', 'Chalkboard SE', sans-serif;
    background: linear-gradient(to bottom, #ffecd2, #fcb69f);
    padding: 20px;
    margin: 0;
    user-select: none;
  }

  h1 { 
    color: #4a4a4a; 
    margin-bottom: 10px;
    font-size: 2.5rem;
    text-shadow: 2px 2px 0px #fff;
  }

  .color-container {
    margin-bottom: 15px;
    font-size: 1.2rem;
    font-weight: bold;
    color: #4a4a4a;
  }

  #colorPicker {
    border: none;
    background: transparent;
    width: 40px;
    height: 40px;
    cursor: pointer;
    vertical-align: middle;
  }

  .wrap {
    position: relative;
    display: inline-block;
    box-shadow: 0 10px 20px rgba(0,0,0,0.15);
    border-radius: 20px;
    background: white;
    padding: 10px;
  }

  canvas {
    border: 4px dashed #ff7675;
    background: transparent;
    border-radius: 15px;
    touch-action: none;
    display: block;
  }

  .guide {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 240px;
    font-weight: bold;
    color: rgba(0, 0, 0, 0.07);
    pointer-events: none;
    font-family: Arial, sans-serif;
  }

  .controls {
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  button {
    padding: 12px 28px;
    font-size: 1.2rem;
    font-weight: bold;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    transition: transform 0.1s, filter 0.1s;
  }

  button:active {
    transform: scale(0.95);
  }

  .clear { background: #ff7675; color: white; }
  .next { background: #2ecc71; color: white; }

  .stats-panel {
    margin-top: 15px;
    background: rgba(255, 255, 255, 0.7);
    padding: 10px;
    border-radius: 15px;
    display: inline-block;
    min-width: 250px;
    border: 2px solid #ffccd5;
  }

  #result {
    font-size: 1.5rem;
    font-weight: bold;
    color: #4a4a4a;
    margin-bottom: 5px;
  }

  .stars {
    font-size: 35px;
    height: 45px;
    color: gold;
  }

  #totalScore {
    font-size: 1.3rem;
    font-weight: bold;
    color: #4a4a4a;
    margin-top: 5px;
  }
</style>
</head>
<body>

<h1>Alphabet Tracing Simulator</h1>

<div class="color-container">
  <label for="colorPicker">🎨 Pick Crayon: </label> 
  <input type="color" id="colorPicker" value="#e74c3c">
</div>

<div class="wrap">
  <div class="guide" id="guideLetter">A</div>
  <canvas id="canvas" width="350" height="350"></canvas>
</div>

<div class="controls">
  <button class="clear" onclick="clearCanvas()">🧹 Clear</button>
  <button class="next" onclick="nextLetter()">➡️ Next Letter</button>
</div>

<div class="stats-panel">
  <div id="result">Draw on the letter!</div>
  <div class="stars" id="stars"></div>
  <div id="totalScore">Total Score: 0</div>
</div>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
let drawing = false;

let rawPointsCount = 0; 
let evaluationTimeout = null; 

const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let index = 0;

let totalScore = 0;
let letterDone = false;

function speakLetter(letter) {
  if ('speechSynthesis' in window) {
    speechSynthesis.cancel(); 
    let msg = new SpeechSynthesisUtterance("Trace the letter " + letter);
    msg.rate = 0.9;
    speechSynthesis.speak(msg);
  }
}

function updateLetter() {
  document.getElementById("guideLetter").innerText = letters[index];
  speakLetter(letters[index]);
}

// Mouse Controls
canvas.addEventListener("mousedown", (e) => {
  if (letterDone) return;
  clearTimeout(evaluationTimeout); 
  drawing = true;
  ctx.beginPath();
  const coords = getMousePos(e);
  ctx.moveTo(coords.x, coords.y);
});

canvas.addEventListener("mouseup", () => {
  if (!drawing) return;
  drawing = false;
  startAutoCheckTimer();
});

canvas.addEventListener("mouseleave", () => {
  if (!drawing) return;
  drawing = false;
  startAutoCheckTimer();
});

canvas.addEventListener("mousemove", (e) => {
  if (!drawing || letterDone) return;
  const coords = getMousePos(e);
  drawStroke(coords.x, coords.y);
});

// Touch Controls
canvas.addEventListener("touchstart", (e) => {
  if (letterDone) return;
  clearTimeout(evaluationTimeout); 
  drawing = true;
  ctx.beginPath();
  const coords = getTouchPos(e);
  ctx.moveTo(coords.x, coords.y);
  e.preventDefault();
}, { passive: false });

canvas.addEventListener("touchend", () => {
  if (!drawing) return;
  drawing = false;
  startAutoCheckTimer();
});

canvas.addEventListener("touchmove", (e) => {
  if (!drawing || letterDone) return;
  const coords = getTouchPos(e);
  drawStroke(coords.x, coords.y);
  e.preventDefault();
}, { passive: false });

function getMousePos(e) {
  return { x: e.offsetX, y: e.offsetY };
}

function getTouchPos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  return {
    x: touch.clientX - rect.left,
    y: touch.clientY - rect.top
  };
}

function drawStroke(x, y) {
  ctx.strokeStyle = document.getElementById("colorPicker").value;
  ctx.lineWidth = 14; 
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  ctx.lineTo(x, y);
  ctx.stroke();
  
  rawPointsCount++;
}

// Gives a 5-second window for kids to lift their fingers between strokes (like crossing a 'T' or 'A')
function startAutoCheckTimer() {
  clearTimeout(evaluationTimeout);
  if (rawPointsCount > 0 && !letterDone) {
    evaluationTimeout = setTimeout(checkTrace, 5000);
  }
}

function clearCanvas() {
  clearTimeout(evaluationTimeout);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  rawPointsCount = 0;
  letterDone = false;
  document.getElementById("result").innerText = "Draw on the letter!";
  document.getElementById("stars").innerText = "";
}

function checkTrace() {
  if (letterDone || rawPointsCount === 0) return;

  // Verify enough content was drawn
  if (rawPointsCount < 20) {
    document.getElementById("result").innerText = "Keep tracing to finish!";
    return;
  }

  document.getElementById("result").innerText = "Correct! +5 Points";
  document.getElementById("stars").innerText = "⭐⭐⭐⭐⭐";

  totalScore += 5;
  document.getElementById("totalScore").innerText = "Total Score: " + totalScore;

  letterDone = true;

  if ('speechSynthesis' in window) {
    let msg = new SpeechSynthesisUtterance("Super job! You got 5 points!");
    speechSynthesis.speak(msg);
  }
}

function nextLetter() {
  index = (index + 1) % letters.length;
  clearCanvas();
  updateLetter();
}

window.onload = () => {
  updateLetter();
};
</script>
</body>
</html>
